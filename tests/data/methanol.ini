[molecules]
input_files: methanol.xyz

[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 1.0
esp               : None
grid              : None
vdw_radii         : None

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.0005
resp_b            : 0.1
toler             : 1e-5
max_it            : 25 
ihfree            : True

[constraints]
constraint_charge : None
equivalent_groups : group_1 = 2 3 4

[qm.options]
method_esp : scf
basis_esp  : assign H 6-31g*,
             assign C 6-31g*,
             assign O 6-31g*

formal_charge : 0
multiplicity  : 1
