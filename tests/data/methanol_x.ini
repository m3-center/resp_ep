[molecules]
input_files: methanol_x.xyz

[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 1.0
esp               : methanol_esp.dat
grid              : methanol_grid.dat
vdw_radii         : X = 0

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.0005
resp_b            : 0.1
toler             : 1e-5
max_it            : 25 
ihfree            : True

[constraints]
constraint_charge : None
equivalent_groups : group_1 = 2 3 4,
					group_2 = 7 8

[qm.options]
method_esp : None 
basis_esp  : None

formal_charge : 0
multiplicity  : 1
