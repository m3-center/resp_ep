[molecules]
input_files: acetic_acid_x.xyz
    
[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 1.0
esp               : acetic_acid_esp.dat
grid              : acetic_acid_grid.dat
vdw_radii_set     : legacy
vdw_radii         : X = 0.0

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.001
resp_b            : 0.1
ihfree            : True
toler             : 1e-5
max_it            : 50 

[constraints]
constraint_charge : 5 =  0.55760227,
                    6 = -0.11425632,
                    7 =  0.37613622,
                    8 = -0.09629322

equivalent_groups : group_1 = 2 3 4,
                    group_2 = 9 10,
                    group_3 = 11 12

[qm.options]
method_esp    : None
basis_esp     : None

formal_charge : 0
multiplicity  : 1