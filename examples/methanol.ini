[molecules]
input_files: methanol.xyz
    
[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 6.0
esp               : None
grid              : None
vdw_radii         : None

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.0005
resp_b            : 0.001
ihfree            : True
toler             : 1e-5
max_it            : 55 

[constraints]
constraint_charge : None
equivalent_groups : group_1 = 2 3 4

[qm.options]
method_esp : mp2
basis_esp  : assign H aug-cc-pvtz,
             assign C aug-cc-pvtz,
             assign O aug-cc-pvtz

formal_charge : 0
multiplicity  : 1
