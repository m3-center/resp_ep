[molecules]
input_files: 1_bromobutane_conf1.xyz

[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 1.0
esp               : None
grid              : None

vdw_radii_set     : legacy
vdw_radii         : BR = 1.85

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.0005
resp_b            : 0.1
ihfree            : True
toler             : 1e-5
max_it            : 50 

[constraints]
constraint_charge : None
equivalent_groups : None

[qm.options]
method_esp : hf
basis_esp  : assign H 6-31G*,
             assign C 6-31G*,
             assign O 6-31G*,
             assign Br 6-31G*

formal_charge : 0
multiplicity  : 1

