[molecules]
input_files: 1_bromobutane_conf1_x.xyz

[vdw.surface.options]
vdw_scale_factors : 1.4, 1.6, 1.8, 2.0
vdw_point_density : 1.0
esp               : 1_bromobutane_conf1_esp.dat
grid              : 1_bromobutane_conf1_grid.dat
vdw_radii_set     : legacy
vdw_radii         : BR = 1.85,
                    X = 0.0

[hyperbolic.restraint.options]
weight            : 1.0
restraint         : True
resp_a            : 0.0005
resp_b            : 0.1
ihfree            : True
toler             : 1e-5
max_it            : 50 

[constraints]
constraint_charge : 14 = -0.41417221,
                    15 =  0.10258585

equivalent_groups : group_1 = 2 3 4,
                    group_2 = 6 7,
                    group_3 = 9 10,
                    group_4 = 12 13

[qm.options]
method_esp : None
basis_esp  : None

formal_charge : 0
multiplicity  : 1
